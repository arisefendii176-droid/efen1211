<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Laundry Kiloan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #2563eb;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: 20px auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #2563eb;
      color: white;
    }
    button.action-btn {
      width: auto;
      padding: 5px 10px;
      margin: 0 2px;
      cursor: pointer;
    }
    button.edit { background: #facc15; color: #000; border: none; }
    button.delete { background: #ef4444; color: white; border: none; }
    .total {
      font-weight: bold;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>Sistem Laundry Kiloan</h1>

<form id="laundryForm">
  <input type="hidden" id="index" value="">
  <label>Nama Pelanggan:</label>
  <input type="text" id="nama" required>

  <label>Berat (kg):</label>
  <input type="number" id="berat" min="0.1" step="0.1" required>

  <label>Harga per kg (Rp):</label>
  <input type="number" id="harga" min="0" step="1000" value="10000" required>

  <label>Tanggal Masuk:</label>
  <input type="date" id="tanggal" required>

  <label>Status:</label>
  <select id="status" required>
    <option value="Proses">Proses</option>
    <option value="Selesai">Selesai</option>
  </select>

  <div class="total" id="estimasi">Total Estimasi: Rp0</div>

  <button type="submit">Simpan</button>
</form>

<table>
  <thead>
    <tr>
      <th>No</th>
      <th>Nama</th>
      <th>Berat (kg)</th>
      <th>Harga/kg (Rp)</th>
      <th>Total Estimasi (Rp)</th>
      <th>Tanggal Masuk</th>
      <th>Status</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody id="laundryTable">
    <!-- Data akan muncul di sini -->
  </tbody>
</table>

<script>
  let laundryData = [];

  const form = document.getElementById('laundryForm');
  const table = document.getElementById('laundryTable');
  const indexInput = document.getElementById('index');
  const estimasiDiv = document.getElementById('estimasi');

  const beratInput = document.getElementById('berat');
  const hargaInput = document.getElementById('harga');

  // Update estimasi otomatis saat berat atau harga diubah
  function updateEstimasi() {
    const berat = parseFloat(beratInput.value) || 0;
    const harga = parseFloat(hargaInput.value) || 0;
    const total = berat * harga;
    estimasiDiv.textContent = `Total Estimasi: Rp${total.toLocaleString('id-ID')}`;
  }

  beratInput.addEventListener('input', updateEstimasi);
  hargaInput.addEventListener('input', updateEstimasi);

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const nama = document.getElementById('nama').value;
    const berat = parseFloat(document.getElementById('berat').value);
    const harga = parseFloat(document.getElementById('harga').value);
    const tanggal = document.getElementById('tanggal').value;
    const status = document.getElementById('status').value;
    const totalEstimasi = berat * harga;

    const index = indexInput.value;

    if(index === '') {
      laundryData.push({nama, berat, harga, totalEstimasi, tanggal, status});
    } else {
      laundryData[index] = {nama, berat, harga, totalEstimasi, tanggal, status};
      indexInput.value = '';
    }

    form.reset();
    updateEstimasi();
    renderTable();
  });

  function renderTable() {
    table.innerHTML = '';
    laundryData.forEach((item, i) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${i+1}</td>
        <td>${item.nama}</td>
        <td>${item.berat}</td>
        <td>Rp${item.harga.toLocaleString('id-ID')}</td>
        <td>Rp${item.totalEstimasi.toLocaleString('id-ID')}</td>
        <td>${item.tanggal}</td>
        <td>${item.status}</td>
        <td>
          <button class="action-btn edit" onclick="editData(${i})">Edit</button>
          <button class="action-btn delete" onclick="deleteData(${i})">Hapus</button>
        </td>
      `;
      table.appendChild(row);
    });
  }

  function editData(i) {
    const item = laundryData[i];
    document.getElementById('nama').value = item.nama;
    document.getElementById('berat').value = item.berat;
    document.getElementById('harga').value = item.harga;
    document.getElementById('tanggal').value = item.tanggal;
    document.getElementById('status').value = item.status;
    indexInput.value = i;
    updateEstimasi();
  }

  function deleteData(i) {
    if(confirm('Yakin ingin menghapus data ini?')) {
      laundryData.splice(i, 1);
      renderTable();
    }
  }
</script>

</body>
</html>
